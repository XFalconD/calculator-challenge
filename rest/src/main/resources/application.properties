spring.application.name=rest
server.port=8080

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=rest-calculator-group
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Topics
kafka.topic.request=calculator-requests
kafka.topic.response=calculator-responses

# Calculator Configuration
calculator.request.timeout=30
calculator.request.timeout.unit=SECONDS
calculator.precision=50

# Logging
logging.level.root=INFO
logging.level.com.wit.rest=DEBUG
